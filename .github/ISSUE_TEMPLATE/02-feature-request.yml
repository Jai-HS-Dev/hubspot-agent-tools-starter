name: Feature request
description: Suggest an improvement to the starter
title: "[Feature]: "
labels: ["enhancement", "triage"]
body:
  - type: textarea
    id: problem
    attributes:
      label: What problem would this solve?
    validations:
      required: true
  - type: textarea
    id: proposal
    attributes:
      label: What change do you want?
    validations:
      required: true
  - type: textarea
    id: scope
    attributes:
      label: Notes on scope
      description: Explain whether this should stay generic for a public starter.