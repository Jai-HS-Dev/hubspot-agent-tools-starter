name: Bug report
description: Report a problem in the starter or its documentation
title: "[Bug]: "
labels: ["bug", "triage"]
body:
  - type: markdown
    attributes:
      value: |
        Thanks for reporting a problem. Please keep secrets and customer data out of public issues.
  - type: textarea
    id: summary
    attributes:
      label: What happened?
      description: Describe the problem and what you expected instead.
    validations:
      required: true
  - type: textarea
    id: reproduction
    attributes:
      label: How can we reproduce it?
      description: Share the smallest possible reproduction.
      render: shell
    validations:
      required: true
  - type: textarea
    id: context
    attributes:
      label: Environment and context
      description: Mention Node version, hosting choice, and relevant setup details.
  - type: checkboxes
    id: checks
    attributes:
      label: Safety checks
      options:
        - label: I removed secrets and sensitive data from this report
          required: true